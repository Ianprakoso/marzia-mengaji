<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marzia Mengaji</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          nunito: ['Nunito', 'sans-serif'],
          arabic: ['Amiri', 'serif'],
        },
        colors: {
          primary: '#8338EC',
          secondary: '#FF006E',
          accent: '#FF3D00',
        }
      }
    }
  }
</script>

<style>
:root {
  --c1: #FF3D00; --c2: #FF006E; --c3: #8338EC; --c4: #3A86FF;
  --c5: #06D6A0; --c6: #FFB700; --c7: #FB5607; --c8: #00B4D8;
  --bg: #F8FAFC; --white: #FFFFFF; --dark: #0F172A;
  --font: 'Nunito', sans-serif; --arabic: 'Amiri', serif;
}

body {
  font-family: var(--font);
  background: #0f172a; /* Dark background out of the frame */
  color: var(--dark);
  min-height: 100vh;
}

.hidden { display: none !important; }

/* Custom Scrollbar for modern touch */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 99px;
}
::-webkit-scrollbar-thumb:hover {
  background: #94a3b8;
}

/* Glassmorphism Auth */
.auth-glass {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

/* Dynamic State Styling */
.tab.on {
  background: #ffffff !important;
  color: inherit !important;
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1) !important;
  transform: translateY(-2px);
  border-radius: 16px 16px 0 0;
}
.tab.off {
  color: rgba(255, 255, 255, 0.7) !important;
  opacity: 0.8;
}

/* Beautiful custom style for Surah Items generated dynamically */
.surah-item {
  background: #ffffff;
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  border: 2px solid #f1f5f9;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02), 0 2px 4px -1px rgba(0,0,0,0.01);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.surah-item:hover {
  transform: translateY(-3px) scale(1.01);
  box-shadow: 0 12px 20px -8px rgba(0,0,0,0.08);
}
.surah-item:active {
  transform: translateY(0px) scale(0.99);
}
.surah-bubble {
  width: 50px;
  height: 50px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 900;
  color: #ffffff;
  flex-shrink: 0;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.surah-info {
  flex: 1;
  min-width: 0;
}
.surah-name {
  font-size: 16px;
  font-weight: 800;
  color: #0f172a;
}
.surah-meta {
  font-size: 13px;
  color: #64748b;
  margin-top: 2px;
}
.surah-bar {
  height: 6px;
  background: #f1f5f9;
  border-radius: 99px;
  margin-top: 8px;
  overflow: hidden;
}
.surah-fill {
  height: 100%;
  border-radius: 99px;
}
.surah-badge {
  font-size: 11px;
  font-weight: 800;
  padding: 6px 14px;
  border-radius: 99px;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}

/* Stats Cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  border-radius: 20px;
  padding: 16px 10px;
  text-align: center;
  border: 2px solid transparent;
  transition: all 0.3s ease;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
}
.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
}
.stat-icon {
  font-size: 26px;
  margin-bottom: 6px;
}
.stat-num {
  font-size: 26px;
  font-weight: 900;
}
.stat-lbl {
  font-size: 11px;
  font-weight: 800;
  opacity: 0.8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Ayat Cards inside Detail view */
.ayat-card {
  background: #ffffff;
  border-radius: 24px;
  padding: 22px;
  margin-bottom: 16px;
  border-left: 6px solid #e2e8f0;
  box-shadow: 0 4px 10px rgba(0,0,0,0.02);
  transition: all 0.3s ease;
}
.ayat-card.active {
  border-left-color: var(--c3) !important;
  background: #faf8ff;
  box-shadow: 0 10px 20px -5px rgba(131, 56, 236, 0.08);
  transform: translateY(-2px);
}
.ayat-card.hafal { border-left-color: var(--c5) !important; }
.ayat-card.sedang { border-left-color: var(--c6) !important; }

/* Arabic Typography */
.arab {
  font-family: var(--arabic);
  font-size: 30px;
  text-align: right;
  direction: rtl;
  line-height: 2.2;
  color: #0f172a;
  margin-bottom: 12px;
}

/* Choices inside Quiz */
.choice {
  background: #ffffff;
  border: 2px solid #e2e8f0;
  border-radius: 20px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.choice:hover {
  border-color: var(--c2);
  background: #fff8f9;
  transform: translateY(-2px);
}
.choice.sel { border-color: var(--c2); background: #fff0f5; box-shadow: 0 4px 12px rgba(255,0,110,0.1); }
.choice.ok { border-color: var(--c5) !important; background: #ecfdf5 !important; }
.choice.no { border-color: var(--c1) !important; background: #fef2f2 !important; }

/* Custom beautiful input styling */
.custom-input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid #e2e8f0;
  border-radius: 16px;
  font-size: 15px;
  outline: none;
  transition: all 0.2s ease;
  background: #f8fafc;
}
.custom-input:focus {
  border-color: var(--c3);
  background: #ffffff;
  box-shadow: 0 0 0 4px rgba(131, 56, 236, 0.1);
}

/* Toast Notification overlay */
#toast-container {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  pointer-events: none;
}
.toast-msg {
  background: #1e293b;
  color: #ffffff;
  padding: 14px 24px;
  border-radius: 16px;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: slideInDown 0.3s ease-out forwards;
}
@keyframes slideInDown {
  from { transform: translateY(-40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
</style>
</head>
<body class="flex justify-center items-stretch font-nunito">

<div id="toast-container"></div>

<!-- Container Utama: Desktop centered app view, mobile full screen -->
<div class="w-full max-w-xl bg-slate-50 min-h-screen flex flex-col shadow-2xl relative">

  <!-- ========================================== -->
  <!-- PAGE: LOGIN                                -->
  <!-- ========================================== -->
  <div id="pg-login" class="flex-1 flex items-center justify-center p-6 bg-gradient-to-br from-[#FF006E] via-[#8338EC] to-[#3A86FF]">
    <div class="auth-glass w-full max-w-md rounded-[32px] p-8 md:p-10 shadow-2xl transition-all duration-300">
      <div class="auth-logo text-center mb-8">
        <span class="text-6xl block mb-4 animate-bounce">🌙</span>
        <div class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-[#FF006E] to-[#8338EC] -webkit-background-clip-text -webkit-text-fill-color:transparent bg-clip-text text-transparent">Marzia Mengaji</div>
        <div class="text-sm text-slate-500 font-semibold mt-2">Belajar Juz 30 dengan menyenangkan!</div>
      </div>
      <div id="msg-login" class="mb-4"></div>
      
      <div class="field mb-4">
        <label class="block text-xs font-extrabold text-slate-600 mb-2 uppercase tracking-wider">Username</label>
        <input type="text" id="in-user" class="custom-input" placeholder="Masukkan username">
      </div>

        <input type="password" id="in-pass" class="custom-input" placeholder="Masukkan password">
      </div>
      
      <button class="w-full py-4 bg-gradient-to-r from-[#FF006E] to-[#8338EC] text-white rounded-2xl font-extrabold hover:opacity-95 transition-all shadow-lg active:scale-95" id="do-login">Masuk ✨</button>
      <div class="text-center text-sm font-semibold text-slate-500 mt-6">Belum punya akun? <a id="go-reg" class="text-[#8338EC] font-extrabold cursor-pointer hover:underline">Daftar dulu</a></div>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- PAGE: REGISTER                             -->
  <!-- ========================================== -->
  <div id="pg-reg" class="hidden flex-1 flex items-center justify-center p-6 bg-gradient-to-br from-[#FF006E] via-[#8338EC] to-[#3A86FF]">
    <div class="auth-glass w-full max-w-md rounded-[32px] p-8 md:p-10 shadow-2xl transition-all duration-300">
      <div class="auth-logo text-center mb-8">
        <span class="text-6xl block mb-4">⭐</span>
        <div class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-[#FF006E] to-[#8338EC] -webkit-background-clip-text -webkit-text-fill-color:transparent bg-clip-text text-transparent">Daftar Baru</div>
        <div class="text-sm text-slate-500 font-semibold mt-2">Yuk mulai perjalanan mengajimu!</div>
      </div>
      <div id="msg-reg" class="mb-4"></div>
      
      <div class="field mb-4">
        <label class="block text-xs font-extrabold text-slate-600 mb-2 uppercase tracking-wider">Username</label>
        <input type="text" id="in-ru" class="custom-input" placeholder="Pilih username">
      </div>
      
      <div class="field mb-6">
        <label class="block text-xs font-extrabold text-slate-600 mb-2 uppercase tracking-wider">Password</label>
        <input type="password" id="in-rp" class="custom-input" placeholder="Buat password">
      </div>
      
      <button class="w-full py-4 bg-gradient-to-r from-[#FF006E] to-[#8338EC] text-white rounded-2xl font-extrabold hover:opacity-95 transition-all shadow-lg active:scale-95" id="do-reg">Daftar Sekarang 🚀</button>
      <div class="text-center text-sm font-semibold text-slate-500 mt-6">Sudah punya akun? <a id="go-login" class="text-[#8338EC] font-extrabold cursor-pointer hover:underline">Masuk di sini</a></div>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- PAGE: MAIN APP                             -->
  <!-- ========================================== -->
  <div id="pg-app" class="hidden flex-1 flex flex-col min-h-screen">
    
    <div class="app-header sticky top-0 z-[200] shadow-md transition-all duration-300" id="app-header">
      <div class="header-hero rounded-b-[32px] p-5 pb-0 text-white transition-all duration-500" id="header-hero">

        <!-- Baris 1: Nama + Kontrol -->
        <div class="header-top flex justify-between items-center mb-4">
          <div class="header-left">
            <div class="text-xs font-extrabold text-white/80 tracking-wider">Assalamu'alaikum 👋</div>

          </div>
          <div class="header-right flex items-center gap-3">
            <div class="streak-badge flex items-center gap-1.5 bg-white/20 border border-white/20 rounded-full px-4 py-1.5 backdrop-blur-md">
              <span class="text-lg">🔥</span>
              <div class="flex items-baseline gap-1">
                <div class="text-base font-extrabold text-yellow-300 leading-none" id="hdr-streak">0</div>
                <div class="text-[10px] font-bold text-white/95">hari</div>
              </div>
            </div>
            <button class="bg-white/10 hover:bg-white/25 border border-white/20 text-white font-extrabold px-4 py-2 rounded-full text-xs transition active:scale-95 flex items-center gap-1" id="btn-logout">
              <span>⎋</span> Keluar

          </div>
        </div>

        <!-- Baris 2: Progress bar -->
        <div class="prog-wrap mb-4">
          <div class="prog-row flex justify-between items-center mb-1.5">

            <span class="text-xs font-extrabold text-white bg-white/20 px-3 py-1 rounded-full backdrop-blur-sm" id="hdr-prog-val">0 / 564 ayat</span>
          </div>
          <div class="pbar h-3 bg-white/20 rounded-full overflow-hidden shadow-inner">
            <div class="pbar-fill h-full rounded-full bg-gradient-to-r from-yellow-300 to-rose-400 transition-all duration-700 ease-out shadow-[0_0_12px_rgba(253,224,71,0.5)]" id="hdr-pbar" style="width:0%"></div>
          </div>
        </div>

        <!-- Baris 3: Tab bar menyatu di dalam hero -->
        <div class="tabs flex gap-1 bg-black/15 rounded-t-[20px] p-1 backdrop-blur-sm" id="tab-bar">
          <button class="tab flex-1 py-3 text-center transition-all duration-300 outline-none" data-tab="beranda">
            <span class="tab-icon block text-lg mb-0.5">🏠</span>
            <span class="text-[10px] font-black uppercase tracking-wider">Beranda</span>
          </button>
          <button class="tab flex-1 py-3 text-center transition-all duration-300 outline-none" data-tab="hafal">
            <span class="tab-icon block text-lg mb-0.5">📖</span>
            <span class="text-[10px] font-black uppercase tracking-wider">Hafal</span>
          </button>
          <button class="tab flex-1 py-3 text-center transition-all duration-300 outline-none" data-tab="tebak">

            <span class="text-[10px] font-black uppercase tracking-wider">Lanjut</span>
          </button>
          <button class="tab flex-1 py-3 text-center transition-all duration-300 outline-none" data-tab="murojaah">
            <span class="tab-icon block text-lg mb-0.5">🔄</span>
            <span class="text-[10px] font-black uppercase tracking-wider">Murojaah</span>
          </button>

      </div>

    <!-- MAIN APP CONTENT AREA -->
    <div class="app-content flex-1 p-5 overflow-y-auto" id="app-content"></div>
  </div>
</div>

<!-- ========================================== -->
<!-- JAVASCRIPT & LOGIC                         -->
<!-- ========================================== -->
<script>
// Intercept dialog alert standar dan gantikan dengan visual Toast
function showToast(message) {
  const container = $('toast-container');
  if(!container) return;
  const toast = document.createElement('div');
  toast.className = 'toast-msg';
  toast.innerHTML = `<span>✨</span><span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'slideInDown 0.3s ease-out reverse forwards';
    setTimeout(() => { toast.remove(); }, 300);
  }, 3000);
}
// Override window.alert default secara aman tanpa merusak logika fungsi aslinya
window.alert = function(msg) {
  showToast(msg);
};

// ==========================================
// PENGATURAN API (NETLIFY -> GOOGLE SCRIPT)
// ==========================================
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6t5frYANPwjzL_Nh0Cn1tdqeb_7KggMMBRJy7XZk99BchxQUTt5juIFYUuPhtRcE/exec";

// ===== WARNA =====
var COLORS = ['#FF3D00','#FF006E','#8338EC','#3A86FF','#06D6A0','#FFB700','#FB5607','#00B4D8','#FF006E','#3A86FF'];
var SURAH_COLORS = {};

// ===== STATE =====
var S = {
  token: localStorage.getItem('mm_token'),
  userId: localStorage.getItem('mm_uid'),
  username: localStorage.getItem('mm_uname'),
  surahList: [],
  ayatList: [],
  progressMap: {},
  totalHafal: 0,
  totalSedang: 0,
  currentTab: 'beranda',
  currentSurah: null,
  audio: null,
  autoPlay: false,
  ayatIndex: 0,
  soalSet: [],
  soalIndex: 0,
  mediaRecorder: null,
  recording: false,
  audioChunks: [],
  recSoalIndex: 0,
  recSoalSet: []
};

function $(id){ return document.getElementById(id); }
function show(id){ $(id).classList.remove('hidden'); }
function hide(id){ $(id).classList.add('hidden'); }
function showPg(id){
  ['pg-login','pg-reg','pg-app'].forEach(function(x){ $(x).classList.add('hidden'); });
  $(id).classList.remove('hidden');
}
function loading(txt){ 
  $('app-content').innerHTML = `
    <div class="flex flex-col items-center justify-center py-20">
      <div class="spinner w-12 h-12 border-4 border-slate-200 border-t-primary rounded-full animate-spin mb-4"></div>
      <p class="text-slate-500 font-extrabold text-sm">${txt || 'Memuat...'}</p>
    </div>
  `; 
}
function msg(id,t,m){ 
  var alertClass = t === 'err' ? 'bg-rose-50 text-rose-600 border-rose-100' : t === 'ok' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-blue-50 text-blue-600 border-blue-100';
  $(id).innerHTML = `<div class="p-4 rounded-xl border text-sm font-bold mb-4 ${alertClass}">${m}</div>`; 
}

function post(body){
  body.token = S.token;
  return fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain'
    },
    body: JSON.stringify(body)
  })
  .then(function(response){ 
    return response.json(); 
  })
  .catch(function(e){ 
    console.error("API Error:", e);
    return {success: false, message: "Gagal terhubung ke server: " + e.message}; 
  });
}

// ===== AUDIO =====
function stopAudio(){
  if(S.audio){ S.audio.pause(); S.audio=null; }
}
function playAudio(url, onEnd){
  stopAudio();
  if(!url) return;
  S.audio = new Audio(url);
  S.audio.play().catch(function(){});
  if(onEnd) S.audio.onended = onEnd;
}

document.addEventListener('DOMContentLoaded', function(){
  $('go-reg').onclick = function(){ showPg('pg-reg'); };
  $('go-login').onclick = function(){ showPg('pg-login'); };
  $('do-login').onclick = doLogin;
  $('do-reg').onclick = doReg;
  $('in-pass').onkeydown = function(e){ if(e.key==='Enter') doLogin(); };
  $('in-rp').onkeydown = function(e){ if(e.key==='Enter') doReg(); };

  document.querySelectorAll('.tab').forEach(function(t){
    t.onclick = function(){
      stopAudio();
      switchTab(t.dataset.tab);
    };
  });

  if(S.token){ initApp(); } else { showPg('pg-login'); }
});

// ===== AUTH =====
async function doLogin(){
  var u=$('in-user').value.trim(), p=$('in-pass').value;
  if(!u||!p){ msg('msg-login','err','Username dan password wajib diisi.'); return; }
  msg('msg-login','info','Memproses...');
  var d = await post({action:'login',username:u,password:p});
  if(d.success){
    S.token=d.token; S.userId=d.userId; S.username=d.username;
    localStorage.setItem('mm_token',d.token);
    localStorage.setItem('mm_uid',d.userId);
    localStorage.setItem('mm_uname',d.username);
    initApp();
  } else { msg('msg-login','err',d.message); }
}

async function doReg(){
  var u=$('in-ru').value.trim(), p=$('in-rp').value;
  if(!u||!p){ msg('msg-reg','err','Username dan password wajib diisi.'); return; }
  msg('msg-reg','info','Memproses...');
  var d = await post({action:'register',username:u,password:p});
  if(d.success){
    msg('msg-reg','ok','Berhasil! Silakan login.');
    setTimeout(function(){ showPg('pg-login'); },1500);
  } else { msg('msg-reg','err',d.message); }
}

function doLogout(){
  post({action:'logout'}).catch(function(){});
  localStorage.clear();
  S.token=null; S.userId=null; S.username=null;
  S.surahList=[]; S.ayatList=[]; S.progressMap={};
  stopAudio();
  showPg('pg-login');
}

// ===== APP INIT =====
async function initApp(){
  showPg('pg-app');
  loading('Memuat data...');
  $('btn-logout').onclick = doLogout;

  var r = await post({action:'getInitialData'});
  if(!r.success){
    if(r.message && (r.message.indexOf('Sesi') !== -1 || r.message.indexOf('valid') !== -1 || r.message.indexOf('berakhir') !== -1)){
      localStorage.clear();
      S.token=null;
      showPg('pg-login');
      return;
    }
    $('app-content').innerHTML='<div class="flex flex-col items-center justify-center text-center p-12"><div class="text-5xl mb-3">😢</div><p class="text-slate-500 font-bold">Gagal memuat: '+r.message+'</p></div>';
    return;
  }

  S.surahList = r.data.surahList;
  S.ayatList = r.data.ayatList;
  S.progressMap = r.data.progressMap;
  S.totalHafal = r.data.totalHafal;
  S.totalSedang = r.data.totalSedang;

  S.surahList.forEach(function(s,i){ SURAH_COLORS[s.surah_number] = COLORS[i%COLORS.length]; });

  $('hdr-name').textContent = r.data.username || 'Sahabat';
  updateHeader();
  updateStreak();
  switchTab('beranda');
}

function updateHeader(){
  var pct = Math.round(S.totalHafal/564*100);
  $('hdr-prog-val').textContent = S.totalHafal+' / 564 ayat';
  $('hdr-pbar').style.width = pct+'%';
}

function updateStreak(){
  var today = new Date().toDateString();
  var last = localStorage.getItem('mm_streak_date');
  var streak = parseInt(localStorage.getItem('mm_streak')||'0');
  if(last!==today){
    streak++;
    localStorage.setItem('mm_streak',streak);
    localStorage.setItem('mm_streak_date',today);
  }
  $('hdr-streak').textContent = streak;
}

function switchTab(tab){
  S.currentTab = tab;
  stopAudio();

  var tabColors = {beranda:'#FF3D00',hafal:'#8338EC',tebak:'#FF006E',lanjut:'#00B4D8',murojaah:'#06D6A0'};
  var heroBg = {
    beranda:'linear-gradient(135deg,#FF3D00,#FF006E)',
    hafal:'linear-gradient(135deg,#8338EC,#3A86FF)',
    tebak:'linear-gradient(135deg,#FF006E,#8338EC)',
    lanjut:'linear-gradient(135deg,#00B4D8,#3A86FF)',
    murojaah:'linear-gradient(135deg,#06D6A0,#00B4D8)'
  };

  $('header-hero').style.background = heroBg[tab]||heroBg.beranda;

  document.querySelectorAll('.tab').forEach(function(t){
    if(t.dataset.tab===tab){
      t.classList.remove('off'); t.classList.add('on');
      t.style.color = tabColors[tab]||'#333';
      t.style.fontWeight = '900';
    } else {
      t.classList.remove('on'); t.classList.add('off');
      t.style.color = '';
      t.style.fontWeight = '';
    }
  });

  if(tab==='beranda') renderBeranda();
  else if(tab==='hafal') renderHafalList();
  else if(tab==='tebak') renderTebakAyat();
  else if(tab==='lanjut') renderLanjutkanAyat();
  else if(tab==='murojaah') renderMurojaah();
}

}

function togglePlayAll(){
  var ayat = S.currentSurah.ayat[S.ayatIndex];
  if(S.audio&&!S.audio.paused){ stopAudio(); $('btn-play-all').textContent='▶'; return; }
  if(ayat) playAudioAyat(S.ayatIndex);
}

function playAudioAyat(idx){
  var ayatList = S.currentSurah.ayat;
  if(idx>=ayatList.length){ $('btn-play-all').textContent='▶'; return; }
  S.ayatIndex = idx;
  var ayat = ayatList[idx];
  var pct = Math.round((idx+1)/ayatList.length*100);
  $('player-ayat-lbl').textContent = 'Ayat '+(idx+1)+' dari '+ayatList.length;
  $('player-track').style.width = pct+'%';
  $('btn-play-all').textContent = '⏸';
  document.querySelectorAll('.ayat-card').forEach(function(el){ el.classList.remove('active'); });
  var el = $('ayat-'+ayat.ayat_number);
  if(el){ el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'center'}); }
  playAudio(ayat.audio_url, function(){
    if(S.autoPlay) playAudioAyat(idx+1);
    else $('btn-play-all').textContent='▶';
  });
}

function toggleAuto(){
  S.autoPlay = !S.autoPlay;
  var t = $('auto-toggle');
  t.classList.toggle('on',S.autoPlay);
  t.classList.toggle('off',!S.autoPlay);
  t.style.background = S.autoPlay?'#8338EC':'#E2E8F0';
}

async function setStatus(surahNum, ayatNum, status){
  var key = surahNum+'_'+ayatNum;
  var old = S.progressMap[key]||'belum';
  S.progressMap[key] = status;

  if(old==='hafal') S.totalHafal--;
  else if(old==='sedang') S.totalSedang--;
  if(status==='hafal') S.totalHafal++;
  else if(status==='sedang') S.totalSedang++;

  updateHeader();

  var surah = S.surahList.find(function(s){ return s.surah_number===surahNum; });
  if(surah){
    var ayatList = S.ayatList.filter(function(a){ return a.surah_number===surahNum; });
    var hafal=0, sedang=0;
    ayatList.forEach(function(a){
      var k=surahNum+'_'+a.ayat_number, st=S.progressMap[k]||'belum';
      if(st==='hafal') hafal++; else if(st==='sedang') sedang++;
    });
    surah.hafal=hafal; surah.sedang=sedang;
    surah.pct=Math.round(hafal/surah.jumlah_ayat*100);
    surah.status=hafal===surah.jumlah_ayat?'hafal':hafal>0||sedang>0?'sedang':'belum';
  }

  var el = $('ayat-'+ayatNum);
  if(el){
    el.className = 'ayat-card '+(status||'belum');
    var numEl = el.querySelector('.ayat-num');
    if(numEl) numEl.textContent = 'Ayat '+ayatNum+(status==='hafal'?' ✓':'');
  }

  await post({action:'updateProgress',surah_number:surahNum,ayat_number:ayatNum,status:status});
  updateStreak();
}

// ===== TEBAK AYAT =====
function renderTebakAyat(){
  var lastGen = parseInt(localStorage.getItem('mm_tebak_time')||'0');
  var now = Date.now();
  var sixHours = 6*60*60*1000;

  if(now-lastGen > sixHours || !S.soalSet.length){
    generateSoalSet();
  } else {
    S.soalIndex = 0;
    tampilSoal();
  }
}

function generateSoalSet(){
  var surahDenganHafalan = S.surahList.filter(function(s){ return s.status==='hafal'||s.status==='sedang'; });

  if(surahDenganHafalan.length===0){
    $('app-content').innerHTML =
      '<div class="flex flex-col items-center justify-center text-center p-10"><div class="text-6xl mb-4">📖</div>'+
      '<p class="text-slate-500 font-extrabold max-w-xs">Belum ada hafalan! Tandai beberapa ayat sebagai "Hafal" atau "Sedang" terlebih dahulu.</p></div>';
    return;
  }

  var soalList = [];

  surahDenganHafalan.forEach(function(s){
    var ayatSurah = S.ayatList.filter(function(a){ return a.surah_number===s.surah_number; });
    for(var i=0; i<ayatSurah.length-1; i++){
      var key = s.surah_number+'_'+ayatSurah[i].ayat_number;
      var st = S.progressMap[key]||'belum';
      if(st==='hafal'||st==='sedang'){
        soalList.push({ surah:s, ayatSoal:ayatSurah[i], ayatJawaban:ayatSurah[i+1], allAyat:ayatSurah });
      }
    }
  });

  if(soalList.length===0){
    $('app-content').innerHTML =
      '<div class="flex flex-col items-center justify-center text-center p-10"><div class="text-6xl mb-4">🤔</div>'+
      '<p class="text-slate-500 font-extrabold max-w-xs">Tidak ada soal tersedia. Pastikan surah yang dihafal memiliki lebih dari 1 ayat.</p></div>';
    return;
  }

  soalList.sort(function(){ return Math.random()-0.5; });
  S.soalSet = soalList.slice(0,3).map(function(item){
    var pengecoh = item.allAyat
      .filter(function(a){
        return a.ayat_number!==item.ayatSoal.ayat_number &&
               a.ayat_number!==item.ayatJawaban.ayat_number;
      })
      .sort(function(){ return Math.random()-0.5; })
      .slice(0,2);

    var pilihanRaw = [item.ayatJawaban].concat(pengecoh);
    pilihanRaw.sort(function(){ return Math.random()-0.5; });

    return {
      surah: item.surah,
      ayatSoal: item.ayatSoal,
      ayatJawaban: item.ayatJawaban,
      pilihan: pilihanRaw,
      jawabanIndex: pilihanRaw.findIndex(function(p){ return p.ayat_number===item.ayatJawaban.ayat_number; })
    };
  });

  localStorage.setItem('mm_tebak_time', Date.now().toString());
  S.soalIndex = 0;
  tampilSoal();
}

function tampilSoal(){
  if(S.soalIndex>=S.soalSet.length){
    tampilHasilAkhir();
    return;
  }

  var soal = S.soalSet[S.soalIndex];
  var c = SURAH_COLORS[soal.surah.surah_number]||COLORS[0];
  
  var progDots = S.soalSet.map(function(_,i){
    var stateClass = i<S.soalIndex ? 'bg-emerald-500' : i===S.soalIndex ? 'bg-amber-400 scale-110' : 'bg-slate-200';
    return '<div class="h-2 rounded-full flex-1 transition-all duration-300 '+stateClass+'"></div>';
  }).join('');

  var pilihanHtml = soal.pilihan.map(function(p,i){
    var btnColors = ['#8338EC','#FF006E','#FF3D00'];
    return '<div class="choice" id="choice-'+i+'" onclick="pilihJawaban('+i+',this)">'+
      '<button class="w-10 h-10 rounded-full flex items-center justify-center text-white text-xs shadow-md transition active:scale-90 flex-shrink-0" style="background:'+btnColors[i%btnColors.length]+';" onclick="event.stopPropagation();playAudio(\''+p.audio_url+'\')">▶</button>'+
      '<div class="c-arab text-right text-lg leading-relaxed flex-1" style="font-family: var(--arabic)">'+p.teks_arab+'</div>'+
    '</div>';
  }).join('');

  $('app-content').innerHTML =
    '<div class="flex gap-2 mb-6">'+progDots+'</div>'+
    '<div class="bg-white rounded-[32px] p-6 border-2 shadow-lg mb-6" style="border-color:'+c+'30">'+
      '<div class="inline-flex items-center gap-2 text-xs font-black px-4 py-2 text-white rounded-full mb-4" style="background:'+c+'">🎵 Tebak Ayat • '+soal.surah.nama_latin+'</div>'+
      '<button class="w-full py-4 rounded-2xl font-black text-white shadow-md active:scale-95 transition-all flex items-center justify-center gap-2 mb-4" style="background:'+c+'" onclick="playAudio(\''+soal.ayatSoal.audio_url+'\')">▶ &nbsp;Dengarkan Soal</button>'+
      '<div class="rounded-2xl p-5 mb-4 text-center border-2 border-dashed" style="background:'+c+'10; border-color:'+c+'50">'+
        '<div class="arab text-center" style="text-align: center; direction: rtl;">'+soal.ayatSoal.teks_arab+'</div>'+
      '</div>'+
      '<div class="text-xs text-center text-slate-400 font-extrabold uppercase tracking-widest mb-4">👇 Pilih ayat selanjutnya</div>'+
      '<div class="flex flex-col gap-3 mb-6">'+pilihanHtml+'</div>'+
      '<button class="w-full py-4 text-white font-black rounded-2xl shadow-lg active:scale-95 transition" style="background:linear-gradient(135deg,'+c+',#8338EC);" onclick="kirimTebak('+soal.jawabanIndex+')">Kirim Jawaban ✓</button>'+
    '</div>';

  S.pilihanDipilih = null;
}

var pilihanDipilih = null;
function pilihJawaban(idx, el){
  document.querySelectorAll('.choice').forEach(function(c){ c.classList.remove('sel'); });
  el.classList.add('sel');
  pilihanDipilih = idx;
}

async function kirimTebak(jawabanIdx){
  if(pilihanDipilih===null){ alert('Pilih jawaban dulu! 👆'); return; }
  var soal = S.soalSet[S.soalIndex];
  var benar = pilihanDipilih===jawabanIdx;

  document.querySelectorAll('.choice').forEach(function(el,i){
    if(i===jawabanIdx) el.classList.add('ok');
    else if(i===pilihanDipilih) el.classList.add('no');
    el.onclick = null;
  });

  await post({
    action:'saveLog',
    surah_number:soal.surah.surah_number,
    ayat_number:soal.ayatSoal.ayat_number,
    fitur:'tebak_ayat',
    hasil:benar?'benar':'salah',
    skor:benar?100:0,
    catatan:''
  });

  setTimeout(function(){
    var c = SURAH_COLORS[soal.surah.surah_number]||COLORS[0];
    var stars = benar?'⭐⭐⭐':'';
    var fbHtml =
      '<div class="feedback-card rounded-[32px] p-8 text-center border-4" style="background:'+(benar?'#E8FFF5':'#FFF0E5')+';border-color:'+(benar?'#06D6A0':'#FF3D00')+';">'+
        '<div class="text-6xl mb-4">'+(benar?'🎉':'💪')+'</div>'+
        '<div class="text-2xl font-extrabold mb-1" style="color:'+(benar?'#06D6A0':'#FF3D00')+'">'+(benar?'Benar! Keren!':'Yuk coba lagi!')+'</div>'+
        '<div class="text-sm font-bold text-slate-500 mb-4">'+(benar?'MasyaAllah, hafalanmu bagus!':'Jangan menyerah, semangat!')+'</div>'+
        (stars?'<div class="flex justify-center gap-1.5 text-3xl mb-4">'+stars+'</div>':'')+
        '<div class="inline-block px-6 py-2.5 rounded-full text-base font-extrabold text-white mb-6" style="background:'+(benar?'#06D6A0':'#FF3D00')+';">'+
          (benar?'Skor: 100/100':'Skor: 0/100')+
        '</div>'+
        '<button class="w-full py-4 text-white font-black rounded-2xl shadow-lg transition active:scale-95" style="background:linear-gradient(135deg,'+c+',#8338EC);" onclick="lanjutSoal()">'+
          (S.soalIndex<S.soalSet.length-1?'Soal Berikutnya ➡':'Lihat Hasil 🏆')+
        '</button>'+
      '</div>';

    var prog = $('app-content').querySelector('.flex.gap-2.mb-6');
    var progHtml = prog ? prog.outerHTML : '';
    $('app-content').innerHTML = progHtml + fbHtml;
  },800);

  pilihanDipilih = null;
}

function lanjutSoal(){
  S.soalIndex++;
  tampilSoal();
}

function tampilHasilAkhir(){
  $('app-content').innerHTML =

      '<div class="text-6xl mb-4">🏆</div>'+

// ===== LANJUTKAN AYAT =====
function renderLanjutkanAyat(){
  var surahDenganHafalan = S.surahList.filter(function(s){ return s.status==='hafal'||s.status==='sedang'; });
  if(surahDenganHafalan.length===0){
    $('app-content').innerHTML =
      '<div class="flex flex-col items-center justify-center text-center p-10"><div class="text-6xl mb-4">📖</div>'+
      '<p class="text-slate-500 font-extrabold max-w-xs">Belum ada hafalan! Tandai ayat dulu di tab Hafal Ayat.</p></div>';
    return;
  }

  var kandidat = [];
  surahDenganHafalan.forEach(function(s){
    var ayatSurah = S.ayatList.filter(function(a){ return a.surah_number===s.surah_number; });
    for(var i=0;i<ayatSurah.length-1;i++){
      var key=s.surah_number+'_'+ayatSurah[i].ayat_number;
      var st=S.progressMap[key]||'belum';
      if(st==='hafal'||st==='sedang'){
        kandidat.push({ surah:s, ayatSoal:ayatSurah[i], ayatJawaban:ayatSurah[i+1] });
      }
    }
  });

  if(kandidat.length===0){
    $('app-content').innerHTML='<div class="flex flex-col items-center justify-center text-center p-10"><div class="text-6xl mb-4">🤔</div><p class="text-slate-500 font-bold">Tidak ada soal tersedia.</p></div>';
    return;
  }

  kandidat.sort(function(){ return Math.random()-0.5; });
  S.recSoalSet = kandidat.slice(0,3);
  S.recSoalIndex = 0;
  tampilSoalRekam();
}

function tampilSoalRekam(){
  if(S.recSoalIndex>=S.recSoalSet.length){
    $('app-content').innerHTML =
      '<div class="feedback-card rounded-[32px] p-8 text-center border-4 border-[#00B4D8] bg-gradient-to-br from-[#E8F4FF] to-[#F0FFFF] shadow-xl">'+
        '<div class="text-6xl mb-4">🎤</div>'+
        '<div class="text-2xl font-black text-[#00B4D8] mb-2">Sesi Selesai!</div>'+
        '<div class="text-sm font-bold text-slate-500 mb-6">Bagus sekali! Kamu sudah berlatih membaca hari ini.</div>'+
        '<button class="w-full py-4 text-white font-black rounded-2xl bg-gradient-to-r from-[#00B4D8] to-[#3A86FF] shadow-lg active:scale-95 transition" onclick="renderLanjutkanAyat()">Ulangi Lagi 🔄</button>'+
      '</div>';
    return;
  }

  var soal = S.recSoalSet[S.recSoalIndex];
  var c = SURAH_COLORS[soal.surah.surah_number]||COLORS[3];
  
  var progDots = S.recSoalSet.map(function(_,i){
    var stateClass = i<S.recSoalIndex ? 'bg-emerald-500' : i===S.recSoalIndex ? 'bg-amber-400 scale-110' : 'bg-slate-200';
    return '<div class="h-2 rounded-full flex-1 transition-all duration-300 '+stateClass+'"></div>';
  }).join('');

  $('app-content').innerHTML =
    '<div class="flex gap-2 mb-6">'+progDots+'</div>'+
    '<div class="bg-white rounded-[32px] p-6 border-2 shadow-lg mb-6" style="border-color:#00B4D850">'+
      '<div class="inline-flex items-center gap-2 text-xs font-black px-4 py-2 text-white rounded-full mb-4" style="background:'+c+'">🎤 Lanjutkan Ayat • '+soal.surah.nama_latin+'</div>'+
      
      '<div class="border-2 rounded-2xl p-5 mb-4 bg-slate-50/50" style="border-color:'+c+'20">'+
        '<div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Soal — '+soal.surah.nama_latin+' Ayat '+soal.ayatSoal.ayat_number+'</div>'+
        '<div class="arab" style="text-align: right; direction: rtl;">'+soal.ayatSoal.teks_arab+'</div>'+
        '<div class="text-xs text-slate-500 font-extrabold mt-1">Bacakan ayat selanjutnya...</div>'+
      '</div>'+
      
      '<button class="w-full py-3.5 border-2 rounded-2xl text-xs font-black bg-sky-50 text-sky-600 hover:bg-sky-100 transition active:scale-95 flex items-center justify-center gap-2 mb-6" style="border-color:#3a86ff30" onclick="playAudio(\''+soal.ayatJawaban.audio_url+'\')">▶ Dengar contoh jawaban</button>'+
      
      '<div class="flex flex-col items-center gap-2 mb-6">'+
        '<button class="w-20 h-20 rounded-full flex items-center justify-center text-3xl text-white shadow-xl hover:scale-105 active:scale-90 transition-all cursor-pointer relative" id="rec-btn" style="background:linear-gradient(135deg,#FF3D00,#FF006E);" onclick="toggleRekam('+soal.surah.surah_number+','+soal.ayatSoal.ayat_number+','+soal.ayatJawaban.ayat_number+')">🎤</button>'+
        '<div class="text-xs font-black text-slate-400" id="rec-lbl">Tap untuk merekam</div>'+
      '</div>'+
      
      '<div class="h-10 bg-slate-50 rounded-2xl flex items-center justify-center gap-1.5 px-4 overflow-hidden mb-6" id="wave-viz">'+
        '<div class="wb w-1.5 rounded-full bg-slate-200 transition-all duration-150" style="height:8px;"></div>'+
        '<div class="wb w-1.5 rounded-full bg-slate-200 transition-all duration-150" style="height:16px;"></div>'+
        '<div class="wb w-1.5 rounded-full bg-slate-200 transition-all duration-150" style="height:10px;"></div>'+
        '<div class="wb w-1.5 rounded-full bg-slate-200 transition-all duration-150" style="height:20px;"></div>'+
        '<div class="wb w-1.5 rounded-full bg-slate-200 transition-all duration-150" style="height:12px;"></div>'+
        '<div class="wb w-1.5 rounded-full bg-slate-200 transition-all duration-150" style="height:18px;"></div>'+
        '<div class="wb w-1.5 rounded-full bg-slate-200 transition-all duration-150" style="height:8px;"></div>'+
        '<div class="wb w-1.5 rounded-full bg-slate-200 transition-all duration-150" style="height:14px;"></div>'+
      '</div>'+
      '<div id="rec-result"></div>'+
    '</div>';
}

var waveInterval = null;
async function toggleRekam(surahNum, ayatSoalNum, ayatJawabanNum){
  if(S.recording){
    S.recording = false;
    if(S.mediaRecorder) S.mediaRecorder.stop();
    clearInterval(waveInterval);
    $('rec-btn').classList.remove('recording');
    $('rec-btn').style.animation = 'none';
    $('rec-btn').textContent = '🎤';
    $('rec-lbl').textContent = 'Memproses...';
    return;
  }

  try {
    var stream = await navigator.mediaDevices.getUserMedia({audio:true});
    S.recording = true;
    S.audioChunks = [];
    $('rec-btn').classList.add('recording');
    $('rec-btn').textContent = '⏹';
    $('rec-lbl').textContent = 'Sedang merekam... tap untuk berhenti';

    var waveColors = ['#FF3D00','#FF006E','#8338EC','#3A86FF','#06D6A0','#FFB700','#00B4D8'];
    waveInterval = setInterval(function(){
      var bars = document.querySelectorAll('.wb');
      bars.forEach(function(b, i){
        b.style.height = (Math.random()*28+6)+'px';
        b.style.background = waveColors[i % waveColors.length];
      });
    },150);

    S.mediaRecorder = new MediaRecorder(stream);
    S.mediaRecorder.ondataavailable = function(e){
      if(e.data.size>0) S.audioChunks.push(e.data);
    };
    S.mediaRecorder.onstop = async function(){
      stream.getTracks().forEach(function(t){ t.stop(); });
      clearInterval(waveInterval);
      $('rec-lbl').textContent = 'Menilai bacaan...';

      var blob = new Blob(S.audioChunks, {type:'audio/webm'});
      var reader = new FileReader();
      reader.onload = async function(){
        var base64 = reader.result.split(',')[1];
        var soal = S.recSoalSet[S.recSoalIndex];
        var r = await post({
          action:'nilaiRekaman',
          surah_number:surahNum,
          ayat_number:ayatSoalNum,
          audio_base64:base64,
          mime_type:'audio/webm'
        });

        S.recording = false;

        if(!r.success){
          $('rec-result').innerHTML='<div class="p-4 bg-rose-50 border border-rose-100 text-rose-600 rounded-xl text-sm font-bold">Gagal menilai: '+r.message+'</div>';
          return;
        }

        var d=r.data;
        var benar=d.hasil==='benar'||d.hasil==='hampir_benar';
        $('rec-result').innerHTML =
          '<div class="feedback-card rounded-3xl p-6 text-center border-4 mt-6" style="background:'+(benar?'#E8FFF5':'#FFF0E5')+';border-color:'+(benar?'#06D6A0':'#FF3D00')+';">'+
            '<div class="text-5xl mb-3">'+(d.emoji||( benar?'🎉':'💪'))+'</div>'+
            '<div class="text-xl font-black mb-1" style="color:'+(benar?'#06D6A0':'#FF3D00')+';">'+(benar?'MasyaAllah!':'Yuk coba lagi!')+'</div>'+
            '<div class="text-sm font-bold text-slate-500 mb-4">'+d.feedback+'</div>'+
            (d.catatan_tajwid?'<div class="bg-amber-50 text-amber-700 border border-amber-100 rounded-xl p-3 mb-4 text-xs font-black text-left">📝 '+d.catatan_tajwid+'</div>':'')+
            '<div class="inline-block px-5 py-2 rounded-full text-sm font-black text-white mb-6" style="background:'+(benar?'#06D6A0':'#FF3D00')+';">Skor: '+d.skor+'/100</div>'+
            '<button class="w-full py-4 text-white font-black rounded-2xl bg-gradient-to-r from-[#00B4D8] to-[#3A86FF] shadow-lg active:scale-95 transition" onclick="nextRekam()">'+
              (S.recSoalIndex<S.recSoalSet.length-1?'Soal Berikutnya ➡':'Selesai 🏆')+
            '</button>'+
          '</div>';
      };
      reader.readAsDataURL(blob);
    };

    S.mediaRecorder.start();

    setTimeout(function(){
      if(S.recording&&S.mediaRecorder&&S.mediaRecorder.state==='recording'){
        S.mediaRecorder.stop();
        S.recording=false;
      }
    },15000);

  } catch(err){
    $('rec-lbl').textContent = 'Tap untuk merekam';
    $('rec-result').innerHTML='<div class="p-4 bg-rose-50 border border-rose-100 text-rose-600 rounded-xl text-sm font-bold">Tidak dapat mengakses mikrofon. Pastikan izin mikrofon diberikan.</div>';
    S.recording = false;
  }
}

function nextRekam(){
  S.recSoalIndex++;
  tampilSoalRekam();
}

// ===== MUROJAAH =====
async function renderMurojaah(){
  loading('Memuat jadwal...');
  var r = await post({action:'getMurojaahSchedule'});
  if(!r.success){
    $('app-content').innerHTML='<div class="flex flex-col items-center justify-center p-10"><div class="text-5xl mb-3">😢</div><p class="text-slate-500 font-bold">Gagal memuat jadwal.</p></div>';
    return;
  }

  var jadwal = r.data.filter(function(j){ return j.status==='terjadwal'; });
  var today = new Date().toISOString().split('T')[0];
  var todayList = jadwal.filter(function(j){ return j.tanggal_jadwal===today; });
  var upcoming = jadwal.filter(function(j){ return j.tanggal_jadwal>today; }).slice(0,5);
  var dotColors = ['#8338EC','#00B4D8','#FF006E','#FFB700','#06D6A0'];

  if(jadwal.length===0){
    $('app-content').innerHTML=
      '<div class="flex flex-col items-center justify-center text-center p-10 mb-6"><div class="text-6xl mb-4">📅</div><p class="text-slate-500 font-bold mb-4">Belum ada jadwal muroja\'ah.</p></div>'+
      '<button class="w-full py-4 text-white font-black rounded-2xl bg-gradient-to-r from-[#06D6A0] to-[#00B4D8] shadow-lg active:scale-95 transition" onclick="doGenJadwal()">Buat Jadwal Otomatis ✨</button>';
    return;
  }

  var todayHtml = todayList.map(function(j){
    var surah = S.surahList.find(function(s){ return s.surah_number===j.surah_number; });
    var nama = surah?surah.nama_latin:'Surah '+j.surah_number;
    var c = SURAH_COLORS[j.surah_number]||COLORS[0];
    var audioUrl = '';
    var ayatFirst = S.ayatList.find(function(a){ return a.surah_number===j.surah_number&&a.ayat_number===j.ayat_awal; });
    if(ayatFirst) audioUrl = ayatFirst.audio_url||'';
    return '<div class="bg-emerald-50/50 rounded-3xl p-6 border-2 border-emerald-100 shadow-md mb-6">'+
      '<span class="inline-block bg-emerald-500 text-white text-[10px] font-black px-3.5 py-1 rounded-full mb-3 shadow-sm">📅 Hari Ini</span>'+
      '<div class="text-xl font-black text-slate-800 mb-1">'+nama+'</div>'+
      '<div class="text-sm font-semibold text-slate-500 mb-4">Ayat '+j.ayat_awal+'–'+j.ayat_akhir+' • '+j.catatan+'</div>'+
      '<button class="w-full py-3.5 rounded-2xl text-xs font-black bg-white text-emerald-600 border border-emerald-200 hover:bg-emerald-50 transition active:scale-95 flex items-center justify-center gap-2 mb-4 shadow-sm" onclick="playAudio(\''+audioUrl+'\')">▶ Dengarkan dulu</button>'+
      '<div class="grid grid-columns-3 grid-flow-col gap-2.5">'+
        '<button class="py-3 px-2 rounded-2xl bg-teal-500 hover:bg-teal-600 border-b-4 border-teal-700 text-white font-extrabold text-[10px] flex flex-col items-center justify-center gap-1.5 transition active:scale-95 shadow-sm" onclick="nilaiMurojaah(\''+j.schedule_id+'\','+j.surah_number+',\''+nama+'\',\'lancar\')">'+
          '<span class="text-xl">😄</span>Lancar'+
        '</button>'+
        '<button class="py-3 px-2 rounded-2xl bg-amber-400 hover:bg-amber-500 border-b-4 border-amber-600 text-amber-900 font-extrabold text-[10px] flex flex-col items-center justify-center gap-1.5 transition active:scale-95 shadow-sm" onclick="nilaiMurojaah(\''+j.schedule_id+'\','+j.surah_number+',\''+nama+'\',\'agak_lupa\')">'+
          '<span class="text-xl">🤔</span>Agak Lupa'+
        '</button>'+
        '<button class="py-3 px-2 rounded-2xl bg-rose-500 hover:bg-rose-600 border-b-4 border-rose-700 text-white font-extrabold text-[10px] flex flex-col items-center justify-center gap-1.5 transition active:scale-95 shadow-sm" onclick="nilaiMurojaah(\''+j.schedule_id+'\','+j.surah_number+',\''+nama+'\',\'perlu_diulang\')">'+
          '<span class="text-xl">😅</span>Diulang'+
        '</button>'+
      '</div>'+
    '</div>';
  }).join('');

  var upcomingHtml = upcoming.length>0
    ? '<div class="bg-violet-50/50 rounded-3xl p-6 border border-violet-100 shadow-inner mt-4 mb-6">'+
        '<div class="text-xs font-black text-violet-600 uppercase tracking-widest mb-4">Jadwal Berikutnya</div>'+
        upcoming.map(function(j,i){
          var surah=S.surahList.find(function(s){ return s.surah_number===j.surah_number; });
          var nama=surah?surah.nama_latin:'Surah '+j.surah_number;
          return '<div class="flex items-center gap-3 mb-3.5 last:mb-0">'+
            '<div class="w-3.5 h-3.5 rounded-full flex-shrink-0" style="background:'+dotColors[i%dotColors.length]+';"></div>'+
            '<div class="text-sm font-extrabold text-slate-700">'+nama+' <span class="text-slate-400 font-semibold">— ${j.tanggal_jadwal}</span></div>'+
          '</div>';
        }).join('')+
      '</div>'
    : '';

  $('app-content').innerHTML=
    (todayList.length>0?todayHtml:'<div class="flex flex-col items-center justify-center text-center p-12 bg-white rounded-3xl border shadow-sm mb-4"><div class="text-5xl mb-3">✅</div><p class="text-slate-400 font-extrabold">Tidak ada jadwal muroja\'ah hari ini.</p></div>')+
    upcomingHtml+
    '<button class="w-full py-3.5 text-emerald-600 font-black border-2 border-emerald-200 rounded-2xl bg-white hover:bg-slate-50 transition active:scale-95" onclick="doGenJadwal()">↻ Perbarui Jadwal</button>';
}

async function doGenJadwal(){
  loading('Menyusun jadwal muroja\'ah...');
  var r = await post({action:'generateJadwal'});
  if(r.success){ renderMurojaah(); }
  else {
    $('app-content').innerHTML=
      '<div class="flex flex-col items-center justify-center text-center p-10 mb-6"><div class="text-5xl mb-3">😢</div><p class="text-slate-500 font-bold mb-4">'+r.message+'</p></div>'+
      '<button class="w-full py-4 text-white font-black rounded-2xl bg-violet-600 active:scale-95 transition" onclick="doGenJadwal()">Coba Lagi</button>';
  }
}

async function nilaiMurojaah(scheduleId, surahNum, namaSurah, penilaian){
  loading('Memproses...');
  var r = await post({action:'selesaiMurojaah',schedule_id:scheduleId,surah_number:surahNum,penilaian:penilaian});
  if(r.success){
    var d=r.data;
    $('app-content').innerHTML=
      '<div class="feedback-card rounded-[32px] p-8 text-center border-4 border-emerald-400 bg-gradient-to-br from-[#E8FFF5] to-[#E8F4FF] shadow-xl">'+
        '<div class="text-6xl mb-4">'+(d.emoji||'🌟')+'</div>'+
        '<div class="text-2xl font-black text-emerald-600 mb-1">Muroja\'ah Selesai!</div>'+
        '<div class="text-sm font-bold text-slate-500 mb-6">'+d.pesan+'</div>'+
        '<div class="inline-block px-6 py-2.5 rounded-full text-base font-extrabold text-white bg-emerald-500 mb-6">Ulangi dalam '+d.ulang_dalam_hari+' hari</div>'+
        '<button class="w-full py-4 text-white font-black rounded-2xl bg-gradient-to-r from-emerald-500 to-sky-500 shadow-lg active:scale-95 transition" onclick="renderMurojaah()">Lihat Jadwal 📅</button>'+
      '</div>';
  } else { renderMurojaah(); }
}
</script>
